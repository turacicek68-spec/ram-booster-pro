<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAM Booster Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:#000;
    color:white;
}

/* Uzay arka planı */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(2px 2px at 20% 30%,white,transparent),
    radial-gradient(2px 2px at 70% 20%,white,transparent),
    radial-gradient(1px 1px at 40% 80%,white,transparent),
    radial-gradient(2px 2px at 90% 60%,white,transparent),
    radial-gradient(2px 2px at 15% 70%,white,transparent);
    animation: moveStars 20s linear infinite;
}

@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(100px);}
}

.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:1000px;
    margin:auto;
    text-align:center;
    padding-top:50px;
}

h1{
    font-size:3rem;
    color:#00e5ff;
    text-shadow:0 0 20px #00e5ff;
}

.subtitle{
    margin:15px;
    color:#ccc;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-top:40px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(0,229,255,.4);
    border-radius:20px;
    padding:30px;
    cursor:pointer;
    transition:.3s;
    backdrop-filter:blur(8px);
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 30px #00e5ff;
}

.card.active{
    border:2px solid lime;
    box-shadow:0 0 30px lime;
}

.size{
    font-size:2rem;
    color:#00e5ff;
}

button{
    margin-top:35px;
    padding:15px 40px;
    border:none;
    border-radius:30px;
    font-size:20px;
    background:#00e5ff;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    box-shadow:0 0 25px #00e5ff;
}

.progressBox{
    display:none;
    margin-top:30px;
}

.progress{
    width:100%;
    height:30px;
    background:#222;
    border-radius:30px;
    overflow:hidden;
}

.bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00e5ff,#00ff88);
}

.percent{
    margin-top:10px;
    font-size:24px;
}

.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
    z-index:99;
}

.popup-content{
    background:#111;
    border:1px solid #00e5ff;
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:500px;
}

.popup h2{
    color:#00ff88;
    margin-bottom:15px;
}

.popup button{
    margin-top:20px;
}
</style>
</head>
<body>

<div class="stars"></div>

<div class="container">

    <h1>🚀 RAM BOOSTER PRO</h1>
    <p class="subtitle">Tek tıkla RAM yükseltme teknolojisi (!)</p>

    <div class="cards">
        <div class="card" onclick="selectRam(this)">8 GB</div>
        <div class="card" onclick="selectRam(this)">16 GB</div>
        <div class="card" onclick="selectRam(this)">32 GB</div>
        <div class="card" onclick="selectRam(this)">64 GB</div>
        <div class="card" onclick="selectRam(this)">128 GB</div>
        <div class="card" onclick="selectRam(this)">256 GB</div>
    </div>

    <button onclick="upgrade()">RAM YÜKSELT</button>

    <div class="progressBox" id="progressBox">
        <div class="progress">
            <div class="bar" id="bar"></div>
        </div>
        <div class="percent" id="percent">%0</div>
    </div>

</div>

<div class="popup" id="popup1">
    <div class="popup-content">
        <h2>✅ RAM Başarıyla Yükseltildi</h2>
        <p>Sisteminiz artık ışık hızında çalışıyor.</p>
        <button onclick="showJoke()">Tamam</button>
    </div>
</div>

<div class="popup" id="popup2">
    <div class="popup-content">
        <h2>😂 ŞAKA!</h2>
        <p>
            İnternetten RAM yükseltilemez.<br><br>
            Gerçek RAM yükseltmesi için fiziksel RAM satın alıp bilgisayarına takman gerekir.
        </p>
        <button onclick="location.reload()">Tekrar Dene</button>
    </div>
</div>

<script>
let selected=false;

function selectRam(card){

    document.querySelectorAll(".card").forEach(c=>{
        c.classList.remove("active");
    });

    card.classList.add("active");
    selected=true;
}

function upgrade(){

    if(!selected){
        alert("Önce bir RAM seç!");
        return;
    }

    document.getElementById("progressBox").style.display="block";

    let p=0;

    let timer=setInterval(()=>{

        p++;

        document.getElementById("bar").style.width=p+"%";
        document.getElementById("percent").innerText="%"+p;

        if(p>=100){
            clearInterval(timer);
            document.getElementById("popup1").style.display="flex";
        }

    },40);
}

function showJoke(){
    document.getElementById("popup1").style.display="none";
    document.getElementById("popup2").style.display="flex";
}
</script>

</body>
</html>
