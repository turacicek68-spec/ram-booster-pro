<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAM Booster Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:#000;
    color:white;
}

/* 🌌 UZAY */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(2px 2px at 20% 30%,white,transparent),
    radial-gradient(2px 2px at 70% 20%,white,transparent),
    radial-gradient(1px 1px at 40% 80%,white,transparent),
    radial-gradient(2px 2px at 90% 60%,white,transparent),
    radial-gradient(2px 2px at 15% 70%,white,transparent);
    animation: moveStars 20s linear infinite;
}

@keyframes moveStars{
    from{transform:translateY(0);}
    to{transform:translateY(100px);}
}

/* 🚀 GEMİ */
.ship{
    position:fixed;
    top:100px;
    left:-100px;
    font-size:40px;
    animation:fly 10s linear infinite;
    z-index:1;
}

@keyframes fly{
    from{left:-100px;}
    to{left:110%;}
}

/* ☄️ METEOR */
.meteor{
    position:fixed;
    width:3px;
    height:120px;
    background:white;
    top:-100px;
    right:20%;
    transform:rotate(45deg);
    animation:meteor 6s linear infinite;
}

@keyframes meteor{
    from{top:-100px;}
    to{top:120%;}
}

/* 🧠 CONTAINER */
.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:1000px;
    margin:auto;
    text-align:center;
    padding-top:50px;
}

h1{
    font-size:3rem;
    color:#00e5ff;
    text-shadow:0 0 20px #00e5ff;
}

/* 🎴 CARD */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    margin-top:40px;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(0,229,255,.4);
    border-radius:20px;
    padding:30px;
    cursor:pointer;
    transition:.3s;
    backdrop-filter:blur(8px);
}

.card:hover{
    transform:translateY(-10px) scale(1.08);
    box-shadow:0 0 40px #00e5ff;
}

/* 🔘 BUTTON */
button{
    margin-top:35px;
    padding:15px 40px;
    border:none;
    border-radius:30px;
    font-size:20px;
    background:#00e5ff;
    cursor:pointer;
    font-weight:bold;
    box-shadow:0 0 20px #00e5ff;
}

/* 📊 BAR */
.progress{
    width:100%;
    height:30px;
    background:#222;
    border-radius:30px;
    overflow:hidden;
}

.bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00e5ff,#00ff88);
    box-shadow:0 0 20px #00ff88;
}

/* 📳 SHAKE */
.shake{
    animation:shake 0.2s infinite;
}

@keyframes shake{
    0%{transform:translate(2px,2px);}
    25%{transform:translate(-2px,2px);}
    50%{transform:translate(2px,-2px);}
    75%{transform:translate(-2px,-2px);}
}

/* 🪟 POPUP */
.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    justify-content:center;
    align-items:center;
    z-index:99;
}

.popup-content{
    background:#111;
    border:1px solid #00e5ff;
    padding:30px;
    border-radius:20px;
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="ship">🚀</div>
<div class="meteor"></div>

<div class="container">

    <h1>🚀 RAM BOOSTER PRO</h1>

    <div class="cards">
        <div class="card" onclick="selectRam(this)">8 GB</div>
        <div class="card" onclick="selectRam(this)">16 GB</div>
        <div class="card" onclick="selectRam(this)">32 GB</div>
        <div class="card" onclick="selectRam(this)">64 GB</div>
    </div>

    <button onclick="upgrade()">RAM YÜKSELT</button>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <p id="percent">%0</p>

</div>

<div class="popup" id="popup">
    <div class="popup-content">
        <h2>RAM YÜKSELTİLDİ ✅</h2>
        <button onclick="joke()">Tamam</button>
    </div>
</div>

<div class="popup" id="joke">
    <div class="popup-content">
        <h2>😂 ŞAKA</h2>
        <button onclick="location.reload()">Tekrar</button>
    </div>
</div>

<script>

let selected=false;

function selectRam(el){
document.querySelectorAll(".card").forEach(c=>c.style.background="transparent");
el.style.background="#00e5ff";
selected=true;
}

function upgrade(){

if(!selected){
alert("RAM seç!");
return;
}

let p=0;
let bar=document.getElementById("bar");
let percent=document.getElementById("percent");

let i=setInterval(()=>{

p++;
bar.style.width=p+"%";
percent.innerText="%"+p;

if(p>70){
document.body.classList.add("shake");
}

if(p>=100){
clearInterval(i);
document.body.classList.remove("shake");
document.getElementById("popup").style.display="flex";
}

},30);
}

function joke(){
document.getElementById("popup").style.display="none";
document.getElementById("joke").style.display="flex";
}

</script>

</body>
</html>
